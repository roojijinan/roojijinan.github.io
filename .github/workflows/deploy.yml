name: Build and Deploy Jemdoc

on:
  push:
    branches:
      - master  # Runs every time you push to the master branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate HTML from Jemdoc
        run: |
          # This command runs jemdoc.py on all jemdoc files in your root
          # Ensure jemdoc.py is in your repository root!
          python3 jemdoc.py *.jemdoc

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html
          git commit -m "Automated jemdoc build" || echo "No changes to commit"
          git push
