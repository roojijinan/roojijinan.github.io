name: Build and Deploy Jemdoc

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate HTML from Jemdoc
        run: |
          # This command includes your mysite.conf file
          python3 jemdoc.py -c mysite.conf index.jemdoc
          python3 jemdoc.py -c mysite.conf courses.jemdoc

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html
          git commit -m "Automated jemdoc build with config" || echo "No changes to commit"
          git push
