name: Build and Deploy Jemdoc

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '2.7' # Changed from 3.x to 2.7

      - name: Generate HTML from Jemdoc
        run: |
          # Use python (which defaults to 2.7 in this environment)
          python jemdoc.py -c mysite.conf index.jemdoc
          python jemdoc.py -c mysite.conf courses.jemdoc

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html
          git commit -m "Automated jemdoc build with config" || echo "No changes to commit"
          git push
